<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Info Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Info Viewer</h1>
        <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="searchStudent()">
        <table id="studentTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Year</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>1</td><td>Juan Dela Cruz</td><td>BSIT</td><td>3</td></tr>
                <tr><td>2</td><td>Daniel Padilla</td><td>BSIT</td><td>2</td></tr>
                <tr><td>3</td><td>Joshua Garcia</td><td>BSIT</td><td>1</td></tr>
                <tr><td>4</td><td>Enrique Gill</td><td>BSIT</td><td>4</td></tr>
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
